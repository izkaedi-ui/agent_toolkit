name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run verification pipeline
        run: npm run verify:all
      - name: Generate docs navigation
        run: npm run docs:index
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-os-reports
          path: |
            agent-os-reports/
            docs/
