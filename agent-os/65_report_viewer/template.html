<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Agent OS Diagnostic Report Viewer</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    h1 {
      border-bottom: 2px solid #eaecef;
      padding-bottom: 10px;
    }
    .metrics {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    .card {
      flex: 1;
      padding: 20px;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      background: #fafbfc;
    }
    .card h2 {
      margin-top: 0;
      font-size: 16px;
      color: #586069;
    }
    .card .val {
      font-size: 28px;
      font-weight: bold;
      color: #0366d6;
    }
  </style>
</head>
<body>
  <h1>Agent OS Diagnostic Dashboard</h1>
  <div class="metrics">
    <div class="card">
      <h2>Scorecard</h2>
      <div class="val">{{SCORE}} / 100</div>
      <p>Verdict: <strong>{{VERDICT}}</strong></p>
    </div>
    <div class="card">
      <h2>Benchmark Cases</h2>
      <div class="val">{{BENCHMARK_PASSED}} Passed</div>
      <p>{{BENCHMARK_FAILED}} Failed</p>
    </div>
    <div class="card">
      <h2>Self-Tests</h2>
      <div class="val">{{SELF_TEST_PASSED}} Passed</div>
      <p>{{SELF_TEST_FAILED}} Failed</p>
    </div>
  </div>

  <h2>Report Files</h2>
  <ul>
    {{REPORTS_LIST}}
  </ul>

  <hr>
  <p><em>No claim may exceed evidence.</em></p>
</body>
</html>
